<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 栖宠港湾</title>
    <style>
        :root {
            --dark-brown: #6B5858;
            --light-pink: #E8D3D3;
            --cream-white: #FAF7F3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--cream-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(107, 88, 88, 0.1);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dark-brown);
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 1.5rem;
            color: var(--dark-brown);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #999;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark-brown);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--light-pink);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--dark-brown);
            box-shadow: 0 0 0 3px rgba(107, 88, 88, 0.1);
        }

        .code-group {
            display: flex;
            gap: 0.8rem;
        }

        .code-group input {
            flex: 1;
        }

        .code-btn {
            padding: 0.8rem 1.2rem;
            background: var(--light-pink);
            color: var(--dark-brown);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .code-btn:hover {
            background: var(--dark-brown);
            color: white;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--dark-brown);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: #5a4848;
            transform: translateY(-2px);
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: var(--dark-brown);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">栖宠港湾</div>
            <h1 class="title">忘记密码</h1>
            <p class="subtitle">请输入您的手机号重置密码</p>
        </div>

        <div class="success-message" id="success-message">
            密码重置成功！即将跳转登录页面...
        </div>

        <form id="reset-form">
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="tel" id="phone" placeholder="请输入手机号" maxlength="11">
            </div>

            <div class="form-group">
                <label for="code">验证码</label>
                <div class="code-group">
                    <input type="text" id="code" placeholder="请输入验证码" maxlength="6">
                    <button type="button" class="code-btn" onclick="sendCode()">获取验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label for="new-password">新密码</label>
                <input type="password" id="new-password" placeholder="请输入新密码">
            </div>

            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" placeholder="请再次输入新密码">
            </div>

            <button type="button" class="submit-btn" onclick="resetPassword()">重置密码</button>
        </form>

        <div class="back-link">
            <a href="index.html#login">← 返回登录</a>
        </div>
    </div>

    <script>
        function sendCode() {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length !== 11) {
                alert('请输入正确的手机号');
                return;
            }
            alert('模拟验证码已发送');
        }

        function resetPassword() {
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('code').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!phone || phone.length !== 11) {
                alert('请输入正确的手机号');
                return;
            }
            if (!code) {
                alert('请输入验证码');
                return;
            }
            if (!newPassword || newPassword.length < 6) {
                alert('密码长度至少6位');
                return;
            }
            if (newPassword !== confirmPassword) {
                alert('两次密码输入不一致');
                return;
            }

            // 显示成功消息
            document.getElementById('success-message').style.display = 'block';
            
            // 2秒后跳转
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }
    </script>
</body>
</html>
